name: Build and Publish Mod

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew build

      - name: Determine version name
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Modrinth
        id: modrinth
        run: |
          JAR=$(ls build/libs/shipping_container-*.jar | grep -v sources | head -1)
          echo "Publishing $JAR"
          RESPONSE=$(curl -sf -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: ${{ secrets.MODRINTH_API_TOKEN }}" \
            -F "data={\"project_id\":\"${{ secrets.MODRINTH_PROJECT_ID }}\",\"name\":\"${{ steps.version.outputs.name }}\",\"version_number\":\"${{ steps.version.outputs.name }}\",\"game_versions\":[\"1.20.1\"],\"loaders\":[\"forge\"],\"version_type\":\"release\",\"dependencies\":[]}" \
            -F "files=@$JAR")
          echo "modrinth_version_id=$(echo $RESPONSE | python3 -c 'import json,sys; print(json.load(sys.stdin)[\"id\"])')" >> "$GITHUB_OUTPUT"

      - name: Trigger modpack update
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MODPACK_DISPATCH_TOKEN }}
          repository: infrastructureSickos/minecraft-modpack
          event-type: shipping-container-updated
          client-payload: '{"version": "${{ github.ref_name }}"}'
