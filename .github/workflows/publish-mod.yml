name: Build and Publish Mod

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew build

      - name: Determine version name
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Modrinth
        id: modrinth
        run: |
          JAR=$(ls build/libs/shipping_container-*.jar | grep -v sources | head -1)
          echo "Publishing $JAR"
          RESPONSE=$(curl -sf -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: ${{ secrets.MODRINTH_API_TOKEN }}" \
            -F "data={\"project_id\":\"${{ secrets.MODRINTH_PROJECT_ID }}\",\"name\":\"${{ steps.version.outputs.name }}\",\"version_number\":\"${{ steps.version.outputs.name }}\",\"game_versions\":[\"1.20.1\"],\"loaders\":[\"forge\"],\"version_type\":\"release\",\"dependencies\":[]}" \
            -F "files=@$JAR")
          echo "modrinth_version_id=$(echo $RESPONSE | python3 -c 'import json,sys; print(json.load(sys.stdin)[\"id\"])')" >> "$GITHUB_OUTPUT"

      - name: Update modpack server repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          MODRINTH_VERSION_ID: ${{ steps.modrinth.outputs.modrinth_version_id }}
        run: |
          git config --global user.email "ci@infrastructuresickos.github"
          git config --global user.name "InfrastructureSickos CI"
          git clone "https://x-access-token:${GH_PAT}@github.com/infrastructureSickos/server.git" server-repo
          cd server-repo

          python3 - <<'EOF'
          import json, os, sys

          version_id = os.environ["MODRINTH_VERSION_ID"]
          path = "mods-list.json"

          with open(path) as f:
              mods = json.load(f)

          found = False
          for mod in mods:
              if mod.get("modrinth_project_id") == os.environ.get("MODRINTH_PROJECT_ID", "") or mod.get("name") == "shipping-container":
                  mod["version_id"] = version_id
                  found = True
                  break

          if not found:
              mods.append({
                  "name": "shipping-container",
                  "modrinth_project_id": os.environ.get("MODRINTH_PROJECT_ID", ""),
                  "version_id": version_id
              })

          with open(path, "w") as f:
              json.dump(mods, f, indent=2)
              f.write("\n")

          print(f"Updated mods-list.json: shipping-container -> {version_id}")
          EOF

          git add mods-list.json
          git commit -m "chore: update shipping-container to ${{ steps.version.outputs.name }}"
          git push
        env:
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
